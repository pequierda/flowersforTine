<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/gift.png" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
    <title>For My Love ❤️</title>
</head>
<body>
    <!-- Background -->
    <div class="night"></div>
    
    <!-- Floating particles -->
    <div class="particles-container" id="particlesContainer"></div>
    
    <!-- Countdown overlay -->
    <div class="countdown-overlay" id="countdownOverlay">
        <div class="countdown-number" id="countdownNumber">3</div>
        <div class="heartbeat" id="heartbeat"></div>
    </div>
    
    <!-- Envelope container -->
    <div class="envelope-container" id="envelopeContainer" style="display: none;">
        <div class="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-body">
                <div class="envelope-heart">❤️</div>
                <div class="envelope-text">For You</div>
            </div>
        </div>
        <div class="envelope-glow"></div>
        <div class="click-hint">Click to open 💌</div>
    </div>
    
    <!-- Love letter that unfolds from envelope -->
    <div class="love-letter" id="loveLetter" style="display: none;">
        <div class="letter-content">
            <div class="letter-header">My Dearest Adii,</div>
            <div class="letter-body" id="letterBody"></div>
            <div class="letter-footer">Forever yours ❤️</div>
        </div>
        <button class="continue-btn" id="continueBtn">Continue to Your Garden 🌸</button>
    </div>
    
    <!-- Title (shown after letter) -->
    <h1 class="title" id="mainTitle" style="display: none;"></h1>
    
    <!-- Heart button (shown after title) -->
    <div class="heart-button-container" id="heartButtonContainer" style="display: none;">
        <a href="#" class="btn heart" id="openBtn">
            <span class="btn-content heart-state" aria-hidden="true">
                <svg height="32" width="32" viewBox="0 0 24 24" fill="currentColor" class="heart-icon">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </span>
        </a>
    </div>
    
    <!-- Floating hearts container -->
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <!-- Flower overlay (iframe) -->
    <div id="flowerOverlay" class="flower-overlay" style="display: none;">
        <iframe src="about:blank" id="flowerFrame" title="Flowers" allow="autoplay"></iframe>
    </div>
    
    <script src="js/index.js"></script>
</body>
</html>
