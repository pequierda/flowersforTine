<html lang="en">

  <link rel="shortcut icon" href="images/gift.png" type="image/x-icon">
  <link rel="stylesheet" href="css/index.css">

  <!-- Document Title -->
  <title>FLOWERS FOR TINAY</title>
</head>

<body>
  <!-- Background -->
  <div class="night"></div>

  <!-- Title -->
  <h1 class="title"></h1>

  <!-- Flower overlay (iframe) - stays on same page so music keeps playing on mobile -->
  <div id="flowerOverlay" class="flower-overlay" style="display: none;">
    <iframe src="about:blank" id="flowerFrame" title="Flowers" allow="autoplay"></iframe>
  </div>

  <!-- Button -->
  <div style="position: absolute; top: 60vh; width: 100%; display: flex; justify-content: center;">
    <a href="#" class="btn heart" id="openBtn">
      <span class="btn-content open-state">
        <svg height="24" width="24" fill="#FFFFFF" viewBox="0 0 24 24" class="sparkle">
          <path
            d="M10,21.236,6.755,14.745.264,11.5,6.755,8.255,10,1.764l3.245,6.491L19.736,11.5l-6.491,3.245ZM18,21l1.5,3L21,21l3-1.5L21,18l-1.5-3L18,18l-3,1.5ZM19.333,4.667,20.5,7l1.167-2.333L24,3.5,21.667,2.333,20.5,0,19.333,2.333,17,3.5Z">

        </svg>
        <span class="text">Open</span>
      </span>
      <span class="btn-content heart-state" aria-hidden="true">
        <svg height="32" width="32" viewBox="0 0 24 24" fill="currentColor" class="heart-icon">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>

  </div>

  <script src="js/index.js"></script>

</html>
